<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在领五子棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 大厅界面 -->
    <div id="lobby" class="container">
        <h1>在领五子棋</h1>
        <div class="lobby-box">
            <button id="btn-create" class="btn-primary" onclick="createRoom()">创建房间</button>
            <div class="divider"><span>或</span></div>
            <div class="join-row">
                <input id="room-input" type="text" placeholder="输入房间号" maxlength="6">
                <button id="btn-join" class="btn-secondary" onclick="joinRoom()">加入房间</button>
            </div>
            <button id="btn-local" class="btn-local" onclick="startLocal()">本地对战（单机）</button>
        </div>
    </div>

    <!-- 等待对手界面 -->
    <div id="waiting" class="container hidden">
        <h1>在领五子棋</h1>
        <div class="lobby-box">
            <p class="waiting-text">等待对手加入...</p>
            <p class="room-id-label">房间号: <strong id="room-id-display"></strong></p>
            <div class="share-box">
                <input id="share-link" type="text" readonly>
                <button class="btn-copy" onclick="copyLink()">复制链接</button>
            </div>
            <button class="btn-local" onclick="cancelRoom()">取消</button>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game" class="container hidden">
        <h1>在领五子棋</h1>
        <div class="info-panel">
            <div class="player-info">
                <span class="stone black-stone"></span>
                <span id="status">黑棋先行</span>
            </div>
            <div class="score-board">
                <span>黑: <strong id="black-score">0</strong></span>
                <span>白: <strong id="white-score">0</strong></span>
            </div>
            <div id="my-color" class="my-color"></div>
        </div>
        <canvas id="board" width="600" height="600"></canvas>
        <div class="controls">
            <button id="btn-restart" onclick="restartGame()">重新开始</button>
            <button id="btn-undo" onclick="undoMove()">悔棋</button>
            <button id="btn-lobby" class="btn-lobby" onclick="backToLobby()">返回大厅</button>
        </div>
        <div id="win-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2 id="win-message"></h2>
                <button onclick="restartGame()">再来一局</button>
            </div>
        </div>
        <div id="undo-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2 id="undo-message">对方请求悔棋</h2>
                <div class="undo-buttons">
                    <button class="btn-accept" onclick="acceptUndo()">同意</button>
                    <button class="btn-reject" onclick="rejectUndo()">拒绝</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
